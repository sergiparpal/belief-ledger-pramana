name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy belief_ledger_pramana
      - run: uv run pytest -m "not live_llm" --cov=belief_ledger_pramana --cov-branch --cov-report=xml
      - run: uv run python scripts/check_hermes_contract.py
      - if: matrix.python == '3.13'
        run: uv run python -m build && uv run twine check dist/*
      - if: matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: reports-and-packages
          path: |
            coverage.xml
            dist/*

  exact-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --frozen --extra dev
      - run: git clone https://github.com/NousResearch/hermes-agent.git /tmp/hermes-agent
      - run: git -C /tmp/hermes-agent checkout 3b2ef789dfcf92f5b7b18c08c59d25948e50857f
      - run: uv run python scripts/check_hermes_contract.py --checkout /tmp/hermes-agent

  path-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/unit/test_config.py tests/unit/test_store.py tests/contract/test_plugin_contract.py

  hermes-main-canary:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --frozen --extra dev
      - run: git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-main
      - run: uv run python scripts/check_hermes_contract.py --checkout /tmp/hermes-main --allow-version-drift
